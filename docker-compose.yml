# Local development only — PostgreSQL for REEFxCHANGE (Prisma PostgreSQL provider).
# From this folder: npm run db:up
# Stop: npm run db:down
#
# Requires Docker Desktop (Windows/Mac) or Docker Engine + Compose (Linux).

services:
  postgres:
    image: postgres:17
    container_name: frag-exchange-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: frag_exchange
      POSTGRES_USER: frag
      POSTGRES_PASSWORD: fraglocaldev
    ports:
      - "5432:5432"
    volumes:
      - frag_exchange_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frag -d frag_exchange"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  frag_exchange_postgres_data:
