# Local development only — MariaDB 11.8 (LTS) for REEFX (Prisma mysql provider).
# Wire-compatible with mysql:// DATABASE_URL; matches typical production MariaDB.
# From this folder: npm run db:up
# Stop: npm run db:down
#
# Requires Docker Desktop (Windows/Mac) or Docker Engine + Compose (Linux).

services:
  mysql:
    image: mariadb:11.8.6
    container_name: frag-exchange-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: frag_exchange
      MYSQL_USER: frag
      MYSQL_PASSWORD: fraglocaldev
      MYSQL_ROOT_PASSWORD: fragrootlocaldev
    ports:
      - "3306:3306"
    volumes:
      - frag_exchange_mysql_data:/var/lib/mysql
      - ./docker/mysql/99-prisma-migrate-grants.sql:/docker-entrypoint-initdb.d/99-prisma-migrate-grants.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  frag_exchange_mysql_data:
